<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last.fm Time Traveler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 10vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #d51007, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #999;
      margin-bottom: 2.5rem;
    }

    .search-container {
      position: relative;
      width: min(90vw, 480px);
    }

    #search {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.05rem;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    #search::placeholder { color: #777; }
    #search:focus {
      border-color: #d51007;
      box-shadow: 0 0 0 3px rgba(213, 16, 7, 0.25);
    }

    .autocomplete-list {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #1e1b3a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      display: none;
    }

    .autocomplete-list.show { display: block; }

    .ac-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .ac-item:hover, .ac-item.active {
      background: rgba(213, 16, 7, 0.15);
    }

    .ac-item img {
      width: 40px; height: 40px;
      border-radius: 6px;
      object-fit: cover;
      background: #333;
      flex-shrink: 0;
    }

    .ac-item .ac-text { display: flex; flex-direction: column; min-width: 0; }
    .ac-item .ac-track {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ac-item .ac-artist {
      font-size: 0.82rem;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Result card */
    .result-card {
      margin-top: 3rem;
      width: min(90vw, 480px);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      overflow: hidden;
      display: none;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-card.show { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px;
    }

    .result-header img {
      width: 100px; height: 100px;
      border-radius: 12px;
      object-fit: cover;
      background: #333;
      flex-shrink: 0;
    }

    .result-meta h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .result-meta .artist-name {
      font-size: 0.95rem;
      color: #aaa;
      margin-top: 2px;
    }

    .result-body {
      padding: 0 24px 24px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .stat-icon {
      font-size: 1.4rem;
      width: 32px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.82rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
    }

    .not-found {
      padding: 24px;
      text-align: center;
      color: #aaa;
      font-size: 1rem;
    }

    .spinner {
      margin-top: 3rem;
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #d51007;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .spinner.show { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: auto;
      padding: 2rem 0 1rem;
      font-size: 0.78rem;
      color: #555;
    }

    footer a { color: #d51007; text-decoration: none; }

    /* Config error banner */
    .config-banner {
      width: min(90vw, 480px);
      background: rgba(213, 16, 7, 0.12);
      border: 1px solid rgba(213, 16, 7, 0.35);
      border-radius: 12px;
      padding: 18px 22px;
      margin-bottom: 2rem;
      display: none;
      animation: slideUp 0.4s ease;
    }

    .config-banner.show { display: block; }

    .config-banner .banner-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: #ff6b6b;
      margin-bottom: 6px;
    }

    .config-banner .banner-msg {
      font-size: 0.88rem;
      color: #ccc;
      line-height: 1.5;
    }

    .config-banner code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.82rem;
    }

    .album-name {
      font-size: 0.85rem;
      color: #888;
      margin-top: 3px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>🕰️🧑‍🚀 Last.fm Time Traveler</h1>
  <p class="subtitle">Find the very first time you listened to a song</p>

  <div id="config-banner" class="config-banner">
    <div class="banner-title">⚠️ Configuration needed</div>
    <div class="banner-msg" id="banner-msg"></div>
  </div>

  <div class="search-container">
    <input id="search" type="text" placeholder="Start typing a song title…" autocomplete="off" />
    <div id="ac-list" class="autocomplete-list"></div>
  </div>

  <div id="spinner" class="spinner"></div>
  <div id="result" class="result-card"></div>

  <footer>
    Powered by <a href="https://www.last.fm/api" target="_blank">Last.fm API</a>
  </footer>

  <script>
    const searchInput = document.getElementById('search');
    const acList = document.getElementById('ac-list');
    const resultCard = document.getElementById('result');
    const spinner = document.getElementById('spinner');
    const configBanner = document.getElementById('config-banner');
    const bannerMsg = document.getElementById('banner-msg');

    let debounceTimer = null;
    let activeIdx = -1;
    let currentResults = [];
    let configOk = false;

    // Check API config on load
    (async () => {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        if (!data.ok) {
          bannerMsg.innerHTML = data.error;
          configBanner.classList.add('show');
          searchInput.disabled = true;
          searchInput.placeholder = 'Fix configuration first…';
        } else {
          configOk = true;
        }
      } catch {
        bannerMsg.textContent = 'Could not reach the server.';
        configBanner.classList.add('show');
      }
    })();

    // Debounced autocomplete search
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const q = searchInput.value.trim();
      if (q.length < 2) { hideAC(); return; }
      debounceTimer = setTimeout(() => fetchAutocomplete(q), 300);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (!acList.classList.contains('show')) return;
      const items = acList.querySelectorAll('.ac-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
        highlightItem(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        highlightItem(items);
      } else if (e.key === 'Enter' && activeIdx >= 0) {
        e.preventDefault();
        selectResult(currentResults[activeIdx]);
      } else if (e.key === 'Escape') {
        hideAC();
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container')) hideAC();
    });

    async function fetchAutocomplete(q) {
      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        currentResults = await res.json();
        renderAC(currentResults);
      } catch { hideAC(); }
    }

    function renderAC(items) {
      if (!items.length) { hideAC(); return; }
      activeIdx = -1;
      acList.innerHTML = items.map((t, i) => `
        <div class="ac-item" data-idx="${i}">
          <img src="${t.image || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect fill=%22%23333%22 width=%2240%22 height=%2240%22/><text x=%2220%22 y=%2224%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2218%22>♪</text></svg>'}" alt="" />
          <div class="ac-text">
            <span class="ac-track">${escHtml(t.name)}</span>
            <span class="ac-artist">${escHtml(t.artist)}</span>
          </div>
        </div>
      `).join('');
      acList.querySelectorAll('.ac-item').forEach(el => {
        el.addEventListener('click', () => selectResult(currentResults[+el.dataset.idx]));
      });
      acList.classList.add('show');
    }

    function highlightItem(items) {
      items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    }

    function hideAC() {
      acList.classList.remove('show');
      acList.innerHTML = '';
      activeIdx = -1;
    }

    async function selectResult(track) {
      hideAC();
      searchInput.value = `${track.name} — ${track.artist}`;
      resultCard.classList.remove('show');
      spinner.classList.add('show');

      try {
        const res = await fetch(
          `/api/first-listen?track=${encodeURIComponent(track.name)}&artist=${encodeURIComponent(track.artist)}`
        );
        const data = await res.json();
        spinner.classList.remove('show');

        if (data.error) {
          showError(data.error);
          return;
        }

        if (!data.found) {
          resultCard.innerHTML = `<div class="not-found">😔 You've never listened to <strong>${escHtml(track.name)}</strong> by ${escHtml(track.artist)}.</div>`;
          resultCard.classList.add('show');
          return;
        }

        const dateObj = data.timestamp ? new Date(data.timestamp * 1000) : null;
        const niceDate = dateObj
          ? dateObj.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
          : data.date;
        const niceTime = dateObj
          ? dateObj.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })
          : '';
        const timeAgo = dateObj ? relativeTime(dateObj) : '';

        const imgSrc = data.image || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23222%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2258%22 text-anchor=%22middle%22 fill=%22%23555%22 font-size=%2240%22>♪</text></svg>';

        resultCard.innerHTML = `
          <div class="result-header">
            <img src="${imgSrc}" alt="Album art" />
            <div class="result-meta">
              <h2>${escHtml(data.track)}</h2>
              <div class="artist-name">${escHtml(data.artist)}</div>
              ${data.album ? `<div class="album-name">${escHtml(data.album)}</div>` : ''}
            </div>
          </div>
          <div class="result-body">
            <div class="stat-row">
              <span class="stat-icon">📅</span>
              <div>
                <div class="stat-label">First listened on</div>
                <div class="stat-value">${escHtml(niceDate)}${niceTime ? ' at ' + escHtml(niceTime) : ''}</div>
              </div>
            </div>
            <div class="stat-row">
              <span class="stat-icon">⏳</span>
              <div>
                <div class="stat-label">That was</div>
                <div class="stat-value">${escHtml(timeAgo)}</div>
              </div>
            </div>
            <div class="stat-row">
              <span class="stat-icon">🔁</span>
              <div>
                <div class="stat-label">Total scrobbles</div>
                <div class="stat-value">${data.total_scrobbles.toLocaleString()}</div>
              </div>
            </div>
          </div>
        `;
        resultCard.classList.add('show');
      } catch (err) {
        spinner.classList.remove('show');
        showError('Something went wrong. Please try again.');
      }
    }

    function showError(msg) {
      resultCard.innerHTML = `<div class="not-found">⚠️ ${escHtml(msg)}</div>`;
      resultCard.classList.add('show');
    }

    function relativeTime(date) {
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      const intervals = [
        [31536000, 'year'], [2592000, 'month'], [86400, 'day'],
        [3600, 'hour'], [60, 'minute']
      ];
      for (const [secs, label] of intervals) {
        const count = Math.floor(seconds / secs);
        if (count >= 1) return `${count} ${label}${count > 1 ? 's' : ''} ago`;
      }
      return 'just now';
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
