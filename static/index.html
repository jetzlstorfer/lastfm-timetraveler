<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last.fm Time Traveler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 8vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #d51007, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #999;
      margin-bottom: 2rem;
    }

    /* Username section */
    .username-section {
      width: min(90vw, 480px);
    .stat-note {
      margin-top: 0.35rem;
      max-width: 30rem;
      color: #a7a7a7;
      font-size: 0.84rem;
      line-height: 1.4;
    }
      margin-bottom: 1.5rem;
    }

    .username-bar {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #username-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 0.95rem;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #username-input::placeholder { color: #777; }
    #username-input:focus {
      border-color: #d51007;
      box-shadow: 0 0 0 3px rgba(213, 16, 7, 0.25);
    }

    #connect-btn {
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #d51007, #ff6b6b);
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    #connect-btn:hover { transform: scale(1.03); }
    #connect-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .user-profile {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      animation: slideUp 0.3s ease;
    }

    .user-profile.show { display: flex; }

    .user-profile img {
      width: 42px; height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: #333;
    }

    .user-profile .user-info { flex: 1; }
    .user-profile .user-name { font-weight: 700; color: #fff; font-size: 1rem; }
    .user-profile .user-stats { font-size: 0.8rem; color: #888; }

    .user-profile .change-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #aaa;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, color 0.2s;
    }

    .user-profile .change-btn:hover { border-color: #d51007; color: #fff; }

    /* Search section */
    .search-section {
      display: none;
      width: min(90vw, 480px);
    }

    .search-section.show { display: block; }

    .search-container {
      position: relative;
      width: 100%;
    }

    #search {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.05rem;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    #search::placeholder { color: #777; }
    #search:focus {
      border-color: #d51007;
      box-shadow: 0 0 0 3px rgba(213, 16, 7, 0.25);
    }

    .autocomplete-list {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #1e1b3a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      display: none;
    }

    .autocomplete-list.show { display: block; }

    .ac-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .ac-item:hover, .ac-item.active {
      background: rgba(213, 16, 7, 0.15);
    }

    .ac-item img {
      width: 40px; height: 40px;
      border-radius: 6px;
      object-fit: cover;
      background: #333;
      flex-shrink: 0;
    }

    .ac-item .ac-text { display: flex; flex-direction: column; min-width: 0; }
    .ac-item .ac-track {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ac-item .ac-artist {
      font-size: 0.82rem;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ac-item .ac-plays {
      font-size: 0.72rem;
      color: #666;
      margin-top: 1px;
    }

    /* Top tracks suggestions */
    .top-tracks-section {
      display: none;
      width: min(90vw, 480px);
      margin-top: 1.5rem;
    }

    .top-tracks-section.show { display: block; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .period-select {
      margin-left: auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #aaa;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    .period-select option { background: #1e1b3a; }

    .top-tracks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .top-track-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .top-track-card:hover {
      background: rgba(213, 16, 7, 0.1);
      border-color: rgba(213, 16, 7, 0.3);
    }

    .top-track-card img {
      width: 36px; height: 36px;
      border-radius: 6px;
      object-fit: cover;
      background: #333;
      flex-shrink: 0;
    }

    .top-track-card .tt-text { min-width: 0; flex: 1; }
    .top-track-card .tt-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-track-card .tt-artist {
      font-size: 0.72rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-track-card .tt-plays {
      font-size: 0.65rem;
      color: #666;
    }

    /* On This Day section */
    .on-this-day-section {
      display: none;
      width: min(90vw, 520px);
      margin-top: 2rem;
    }

    .on-this-day-section.show { display: block; }

    .otd-period {
      margin-bottom: 1.5rem;
      animation: slideUp 0.4s ease;
    }

    .otd-period-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }

    .otd-years-badge {
      display: inline-block;
      background: linear-gradient(135deg, #d51007, #ff6b6b);
      color: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .otd-date {
      font-size: 0.8rem;
      color: #777;
    }

    .otd-total {
      font-size: 0.72rem;
      color: #555;
      margin-left: auto;
    }

    .otd-tracks {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .otd-track {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      min-width: 200px;
      max-width: 260px;
    }

    .otd-track:hover {
      background: rgba(213, 16, 7, 0.1);
      border-color: rgba(213, 16, 7, 0.3);
    }

    .otd-track img {
      width: 38px; height: 38px;
      border-radius: 6px;
      object-fit: cover;
      background: #333;
      flex-shrink: 0;
    }

    .otd-track .otd-text { min-width: 0; }
    .otd-track .otd-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .otd-track .otd-artist {
      font-size: 0.72rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .otd-track .otd-plays {
      font-size: 0.65rem;
      color: #666;
    }

    .otd-empty {
      font-size: 0.85rem;
      color: #555;
      font-style: italic;
      padding: 12px 0;
    }

    /* Result card */
    .result-card {
      margin-top: 2rem;
      width: min(90vw, 480px);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      overflow: hidden;
      display: none;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-card.show { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px;
    }

    .result-header img {
      width: 100px; height: 100px;
      border-radius: 12px;
      object-fit: cover;
      background: #333;
      flex-shrink: 0;
    }

    .result-meta h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .result-meta .artist-name {
      font-size: 0.95rem;
      color: #aaa;
      margin-top: 2px;
    }

    .result-body {
      padding: 0 24px 24px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .stat-icon {
      font-size: 1.4rem;
      width: 32px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.82rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
    }

    .not-found {
      padding: 24px;
      text-align: center;
      color: #aaa;
      font-size: 1rem;
    }

    /* === Time-travel loading screen === */
    .loading-screen {
      margin-top: 2rem;
      width: min(90vw, 480px);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: slideUp 0.4s ease;
    }
    .loading-screen.show { display: flex; }

    /* Starfield viewport */
    .starfield {
      position: relative;
      width: 100%;
      height: 180px;
      background: radial-gradient(ellipse at center, #1a1740 0%, #0f0c29 70%);
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
    }

    /* Stars */
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: starStreak var(--dur) linear infinite;
      opacity: 0;
    }
    @keyframes starStreak {
      0%   { transform: translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateX(-120vw); opacity: 0; }
    }

    /* Rocket — rotated to point right */
    .rocket-container {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      font-size: 3rem;
      filter: drop-shadow(0 0 18px rgba(213,16,7,0.5));
      animation: rocketBob 2s ease-in-out infinite;
      z-index: 2;
      line-height: 1;
    }
    @keyframes rocketBob {
      0%, 100% { transform: translate(-50%, -50%) rotate(45deg) translateY(0); }
      50%      { transform: translate(-50%, -50%) rotate(45deg) translateY(-8px); }
    }


    /* Year counter */
    .year-counter {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 1.6rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(90deg, #d51007, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      z-index: 3;
      text-shadow: none;
    }
    .year-label {
      position: absolute;
      top: 44px;
      right: 18px;
      font-size: 0.65rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      z-index: 3;
    }

    /* Fun facts area */
    .fun-facts-bar {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0 0 16px 16px;
      padding: 16px 22px;
      min-height: 68px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .fact-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .fact-text {
      font-size: 0.88rem;
      color: #bbb;
      line-height: 1.45;
      animation: factFade 0.5s ease;
    }
    @keyframes factFade {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .loading-status {
      text-align: center;
      margin-top: 10px;
      font-size: 0.78rem;
      color: #666;
    }
    .loading-status .loading-dots {
      margin-left: 4px;
    }

    footer {
      margin-top: auto;
      padding: 2rem 0 1rem;
      font-size: 0.78rem;
      color: #555;
    }

    footer a { color: #d51007; text-decoration: none; }

    /* Config error banner */
    .config-banner {
      width: min(90vw, 480px);
      background: rgba(213, 16, 7, 0.12);
      border: 1px solid rgba(213, 16, 7, 0.35);
      border-radius: 12px;
      padding: 18px 22px;
      margin-bottom: 2rem;
      display: none;
      animation: slideUp 0.4s ease;
    }

    .config-banner.show { display: block; }

    .config-banner .banner-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: #ff6b6b;
      margin-bottom: 6px;
    }

    .config-banner .banner-msg {
      font-size: 0.88rem;
      color: #ccc;
      line-height: 1.5;
    }

    .config-banner code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.82rem;
    }

    .album-name {
      font-size: 0.85rem;
      color: #888;
      margin-top: 3px;
      font-style: italic;
    }

    .section-divider {
      width: min(90vw, 480px);
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 1.5rem 0 0.5rem;
    }

    /* Mini loading dots */
    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      margin-left: 8px;
    }
    .loading-dots span {
      width: 6px; height: 6px;
      background: #d51007;
      border-radius: 50%;
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 60%, 100% { opacity: 0.2; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <span style="font-size:2.2rem">🕰️🧑‍🚀</span> <h1 style="display:inline">Last.fm Time Traveler</h1>
  <p class="subtitle">Find the very first time you listened to a song</p>

  <div id="config-banner" class="config-banner">
    <div class="banner-title">⚠️ Configuration needed</div>
    <div class="banner-msg" id="banner-msg"></div>
  </div>

  <!-- Username input -->
  <div class="username-section" id="username-section">
    <div class="username-bar" id="username-bar">
      <input id="username-input" type="text" placeholder="Enter your Last.fm username…" autocomplete="off" />
      <button id="connect-btn">Connect</button>
    </div>
    <div class="user-profile" id="user-profile">
      <img id="user-avatar" src="" alt="" />
      <div class="user-info">
        <div class="user-name" id="user-display-name"></div>
        <div class="user-stats" id="user-stats"></div>
      </div>
      <button class="change-btn" id="change-user-btn">Change</button>
    </div>
  </div>

  <!-- Search section (shown after connecting) -->
  <div class="search-section" id="search-section">
    <div class="search-container">
      <input id="search" type="text" placeholder="Start typing a song title…" autocomplete="off" />
      <div id="ac-list" class="autocomplete-list"></div>
    </div>
  </div>

  <!-- Time-travel loading screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="starfield" id="starfield">
      <div class="rocket-container">🚀</div>
      <div class="year-counter" id="year-counter">2026</div>
      <div class="year-label">Traveling to…</div>
    </div>
    <div class="fun-facts-bar">
      <span class="fact-icon" id="fact-icon">🎵</span>
      <span class="fact-text" id="fact-text">Searching through time…</span>
    </div>
    <div class="loading-status">Scanning your scrobble history<span class="loading-dots"><span></span><span></span><span></span></span></div>
  </div>
  <div id="result" class="result-card"></div>

  <!-- Top tracks suggestions -->
  <div class="top-tracks-section" id="top-tracks-section">
    <div class="section-header">
      <span class="section-title">🎵 Your top tracks</span>
      <select class="period-select" id="period-select">
        <option value="7day">Last 7 days</option>
        <option value="1month" selected>Last month</option>
        <option value="3month">Last 3 months</option>
        <option value="6month">Last 6 months</option>
        <option value="12month">Last year</option>
        <option value="overall">All time</option>
      </select>
    </div>
    <div class="top-tracks-grid" id="top-tracks-grid"></div>
  </div>

  <!-- On This Day section -->
  <div class="on-this-day-section" id="on-this-day-section">
    <div class="section-header">
      <span class="section-title">📅 On this day…</span>
      <div class="loading-dots" id="otd-loading" style="display:none">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="on-this-day-content"></div>
  </div>

  <footer>
    Powered by <a href="https://www.last.fm/api" target="_blank">Last.fm API</a>
  </footer>

  <script>
    const searchInput = document.getElementById('search');
    const acList = document.getElementById('ac-list');
    const resultCard = document.getElementById('result');
    // spinner replaced by loading-screen
    const configBanner = document.getElementById('config-banner');
    const bannerMsg = document.getElementById('banner-msg');
    const usernameInput = document.getElementById('username-input');
    const connectBtn = document.getElementById('connect-btn');
    const usernameBar = document.getElementById('username-bar');
    const userProfile = document.getElementById('user-profile');
    const changeUserBtn = document.getElementById('change-user-btn');
    const searchSection = document.getElementById('search-section');
    const topTracksSection = document.getElementById('top-tracks-section');
    const topTracksGrid = document.getElementById('top-tracks-grid');
    const periodSelect = document.getElementById('period-select');
    const otdSection = document.getElementById('on-this-day-section');
    const otdContent = document.getElementById('on-this-day-content');
    const otdLoading = document.getElementById('otd-loading');

    let debounceTimer = null;
    let activeIdx = -1;
    let currentResults = [];
    let configOk = false;
    let currentUsername = '';

    // === Time-travel loading animation ===
    const loadingScreen = document.getElementById('loading-screen');
    const yearCounter = document.getElementById('year-counter');
    const factText = document.getElementById('fact-text');
    const factIcon = document.getElementById('fact-icon');
    const starfield = document.getElementById('starfield');
    let yearInterval = null;
    let factInterval = null;
    let starsGenerated = false;

    const musicFacts = [
      { icon: '🎸', text: 'The longest officially released song is "The Rise and Fall of Bossanova" at 13 hours, 23 minutes and 32 seconds.' },
      { icon: '💿', text: 'The first CD pressed in the US was Bruce Springsteen\'s "Born in the U.S.A." in 1984.' },
      { icon: '🎵', text: 'The first MP3 ever created was Suzanne Vega\'s "Tom\'s Diner" — used as a test track by the format\'s inventor.' },
      { icon: '📻', text: 'The first song played on MTV was "Video Killed the Radio Star" by The Buggles on August 1, 1981.' },
      { icon: '🎹', text: '"Happy Birthday" was copyrighted until 2016 — for decades, restaurants had to pay royalties to sing it.' },
      { icon: '🎤', text: 'Freddie Mercury\'s vocal range spanned four octaves, from bass low F to soprano high F.' },
      { icon: '🥁', text: 'A vinyl record can hold about 22 minutes of music per side — that\'s why classic albums are ~44 minutes.' },
      { icon: '🎧', text: 'Spotify\'s most-streamed song ever is "Blinding Lights" by The Weeknd with over 4 billion streams.' },
      { icon: '🎷', text: 'The saxophone was invented in 1846 by Adolphe Sax, a Belgian instrument maker.' },
      { icon: '🎻', text: 'A Stradivarius violin from 1721 sold for $15.9 million — the most expensive instrument ever.' },
      { icon: '📀', text: 'Michael Jackson\'s "Thriller" remains the best-selling album of all time with 70 million copies sold.' },
      { icon: '🎶', text: 'The shortest song ever recorded is "You Suffer" by Napalm Death at 1.316 seconds.' },
      { icon: '🎺', text: 'Louis Armstrong\'s "What a Wonderful World" was a flop in the US but #1 in the UK when released in 1967.' },
      { icon: '🪕', text: 'The banjo originated in Africa and was brought to the Americas by enslaved people in the 17th century.' },
      { icon: '🎵', text: 'Last.fm has tracked over 100 billion scrobbles since its launch in 2002.' },
      { icon: '🌍', text: 'Finland has the most metal bands per capita — about 54 metal bands per 100,000 people.' },
      { icon: '🎸', text: 'Jimi Hendrix was self-taught and played a right-handed guitar flipped upside down.' },
      { icon: '🎤', text: 'The word "rhythm" is the longest English word without a vowel.' },
      { icon: '💿', text: 'Pink Floyd\'s "The Dark Side of the Moon" spent 937 weeks on the Billboard 200 chart.' },
      { icon: '🎧', text: 'The first online music store was eMusic, launched in 1998 — five years before iTunes.' },
    ];

    function generateStars() {
      if (starsGenerated) return;
      starsGenerated = true;
      for (let i = 0; i < 40; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.top = Math.random() * 100 + '%';
        star.style.right = '-10px';
        star.style.setProperty('--dur', (Math.random() * 2 + 1.5) + 's');
        star.style.animationDelay = Math.random() * 3 + 's';
        starfield.appendChild(star);
      }
    }

    function startLoadingAnimation() {
      generateStars();
      loadingScreen.classList.add('show');
      // Year countdown
      let year = new Date().getFullYear();
      yearCounter.textContent = year;
      yearInterval = setInterval(() => {
        year -= Math.floor(Math.random() * 3) + 1;
        if (year < 1950) year = new Date().getFullYear();
        yearCounter.textContent = year;
      }, 600);
      // Fun facts rotation
      let lastIdx = -1;
      function showRandomFact() {
        let idx;
        do { idx = Math.floor(Math.random() * musicFacts.length); } while (idx === lastIdx);
        lastIdx = idx;
        const f = musicFacts[idx];
        factIcon.textContent = f.icon;
        factText.style.animation = 'none';
        factText.offsetHeight; // trigger reflow
        factText.style.animation = '';
        factText.textContent = f.text;
      }
      showRandomFact();
      factInterval = setInterval(showRandomFact, 3500);
    }

    function stopLoadingAnimation() {
      loadingScreen.classList.remove('show');
      clearInterval(yearInterval);
      clearInterval(factInterval);
      yearInterval = null;
      factInterval = null;
    }

    // Cookie helpers
    function setCookie(name, value, days = 365) {
      const d = new Date();
      d.setTime(d.getTime() + days * 86400000);
      document.cookie = `${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/;SameSite=Lax`;
    }

    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? decodeURIComponent(match[2]) : '';
    }

    // Check API config on load, then restore username from cookie
    (async () => {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        if (!data.ok) {
          bannerMsg.innerHTML = data.error;
          configBanner.classList.add('show');
          usernameInput.disabled = true;
          connectBtn.disabled = true;
        } else {
          configOk = true;
          const saved = getCookie('lastfm_username');
          if (saved) {
            usernameInput.value = saved;
            connectUser(saved);
          }
        }
      } catch {
        bannerMsg.textContent = 'Could not reach the server.';
        configBanner.classList.add('show');
      }
    })();

    // Connect user
    connectBtn.addEventListener('click', () => {
      const u = usernameInput.value.trim();
      if (u) connectUser(u);
    });

    usernameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const u = usernameInput.value.trim();
        if (u) connectUser(u);
      }
    });

    changeUserBtn.addEventListener('click', () => {
      currentUsername = '';
      userProfile.classList.remove('show');
      usernameBar.style.display = 'flex';
      searchSection.classList.remove('show');
      topTracksSection.classList.remove('show');
      otdSection.classList.remove('show');
      resultCard.classList.remove('show');
      usernameInput.value = '';
      usernameInput.focus();
    });

    async function connectUser(username) {
      connectBtn.disabled = true;
      connectBtn.textContent = '…';
      try {
        const res = await fetch(`/api/user/validate?username=${encodeURIComponent(username)}`);
        const data = await res.json();
        if (!data.ok) {
          alert(data.error);
          connectBtn.disabled = false;
          connectBtn.textContent = 'Connect';
          return;
        }
        currentUsername = data.username;
        setCookie('lastfm_username', currentUsername);

        // Show profile bar
        document.getElementById('user-avatar').src = data.image || defaultAvatar();
        document.getElementById('user-display-name').textContent = data.username;
        const regStr = typeof data.registered === 'string' ? data.registered : '';
        document.getElementById('user-stats').textContent =
          `${data.playcount.toLocaleString()} scrobbles` +
          (regStr ? ` · since ${regStr}` : '');

        usernameBar.style.display = 'none';
        userProfile.classList.add('show');
        searchSection.classList.add('show');
        searchInput.focus();

        // Load top tracks and On This Day in parallel
        loadTopTracks();
        loadOnThisDay();
      } catch (err) {
        alert('Could not connect. Please try again.');
      }
      connectBtn.disabled = false;
      connectBtn.textContent = 'Connect';
    }

    // Top tracks
    periodSelect.addEventListener('change', () => loadTopTracks());

    async function loadTopTracks() {
      if (!currentUsername) return;
      topTracksGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#666;padding:16px;">Loading…</div>';
      topTracksSection.classList.add('show');
      try {
        const res = await fetch(
          `/api/user/top-tracks?username=${encodeURIComponent(currentUsername)}&period=${periodSelect.value}`
        );
        const tracks = await res.json();
        if (!tracks.length) {
          topTracksGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#666;padding:16px;">No top tracks for this period.</div>';
          return;
        }
        topTracksGrid.innerHTML = tracks.map((t, i) => `
          <div class="top-track-card" data-idx="${i}">
            <img src="${t.image || defaultThumb()}" alt="" />
            <div class="tt-text">
              <div class="tt-name">${escHtml(t.name)}</div>
              <div class="tt-artist">${escHtml(t.artist)}</div>
              <div class="tt-plays">${t.playcount} plays</div>
            </div>
          </div>
        `).join('');
        topTracksGrid.querySelectorAll('.top-track-card').forEach(el => {
          el.addEventListener('click', () => {
            const t = tracks[+el.dataset.idx];
            selectResult({ name: t.name, artist: t.artist, image: t.image });
          });
        });
      } catch {
        topTracksGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#666;padding:16px;">Could not load top tracks.</div>';
      }
    }

    // On This Day
    async function loadOnThisDay() {
      if (!currentUsername) return;
      otdLoading.style.display = 'inline-flex';
      otdContent.innerHTML = '';
      otdSection.classList.add('show');
      try {
        const res = await fetch(`/api/on-this-day?username=${encodeURIComponent(currentUsername)}`);
        const periods = await res.json();
        otdLoading.style.display = 'none';

        if (!periods.length) {
          otdContent.innerHTML = '<div class="otd-empty">No scrobbles found on this day in past years.</div>';
          return;
        }

        otdContent.innerHTML = periods.map(p => `
          <div class="otd-period">
            <div class="otd-period-header">
              <span class="otd-years-badge">${p.years_ago} year${p.years_ago > 1 ? 's' : ''} ago</span>
              <span class="otd-date">${p.date}</span>
              <span class="otd-total">${p.total_scrobbles} scrobbles that day</span>
            </div>
            <div class="otd-tracks">
              ${p.tracks.map(t => `
                <div class="otd-track" data-name="${escAttr(t.name)}" data-artist="${escAttr(t.artist)}">
                  <img src="${t.image || defaultThumb()}" alt="" />
                  <div class="otd-text">
                    <div class="otd-name">${escHtml(t.name)}</div>
                    <div class="otd-artist">${escHtml(t.artist)}</div>
                    <div class="otd-plays">${t.plays}× that day</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');

        otdContent.querySelectorAll('.otd-track').forEach(el => {
          el.addEventListener('click', () => {
            selectResult({ name: el.dataset.name, artist: el.dataset.artist, image: '' });
          });
        });
      } catch {
        otdLoading.style.display = 'none';
        otdContent.innerHTML = '<div class="otd-empty">Could not load On This Day data.</div>';
      }
    }

    // Debounced autocomplete search
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const q = searchInput.value.trim();
      if (q.length < 2) { hideAC(); return; }
      debounceTimer = setTimeout(() => fetchAutocomplete(q), 300);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (!acList.classList.contains('show')) return;
      const items = acList.querySelectorAll('.ac-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
        highlightItem(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        highlightItem(items);
      } else if (e.key === 'Enter' && activeIdx >= 0) {
        e.preventDefault();
        selectResult(currentResults[activeIdx]);
      } else if (e.key === 'Escape') {
        hideAC();
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container')) hideAC();
    });

    async function fetchAutocomplete(q) {
      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        currentResults = await res.json();
        renderAC(currentResults);
      } catch { hideAC(); }
    }

    function renderAC(items) {
      if (!items.length) { hideAC(); return; }
      activeIdx = -1;
      acList.innerHTML = items.map((t, i) => `
        <div class="ac-item" data-idx="${i}">
          <img src="${t.image || defaultThumb()}" alt="" />
          <div class="ac-text">
            <span class="ac-track">${escHtml(t.name)}</span>
            <span class="ac-artist">${escHtml(t.artist)}</span>
          </div>
        </div>
      `).join('');
      acList.querySelectorAll('.ac-item').forEach(el => {
        el.addEventListener('click', () => selectResult(currentResults[+el.dataset.idx]));
      });
      acList.classList.add('show');
    }

    function highlightItem(items) {
      items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    }

    function hideAC() {
      acList.classList.remove('show');
      acList.innerHTML = '';
      activeIdx = -1;
    }

    async function selectResult(track) {
      hideAC();
      searchInput.value = `${track.name} — ${track.artist}`;
      resultCard.classList.remove('show');
      startLoadingAnimation();

      try {
        const res = await fetch(
          `/api/first-listen?track=${encodeURIComponent(track.name)}&artist=${encodeURIComponent(track.artist)}&username=${encodeURIComponent(currentUsername)}`
        );
        const data = await res.json();
        stopLoadingAnimation();

        if (data.error) {
          showError(data.error);
          return;
        }

        if (!data.found) {
          resultCard.innerHTML = `<div class="not-found">😔 You've never listened to <strong>${escHtml(track.name)}</strong> by ${escHtml(track.artist)}.</div>`;
          resultCard.classList.add('show');
          return;
        }

        const dateUnavailable = Boolean(data.date_unavailable);
        const dateObj = data.timestamp ? new Date(Number(data.timestamp) * 1000) : null;
        const niceDate = dateObj
          ? dateObj.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
          : (dateUnavailable ? 'Unavailable' : data.date);
        const niceTime = dateObj
          ? dateObj.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })
          : '';
        const timeAgo = dateObj ? relativeTime(dateObj) : (dateUnavailable ? 'Not available' : '');
        const dateNote = dateUnavailable
          ? `${data.date_unavailable_reason || 'Last.fm does not expose the exact timestamp for this play.'} This can happen when the profile or recent tracks are private, or when Last.fm omits older low-play scrobbles from its public API.`
          : '';

        const imgSrc = data.image || defaultAlbumArt();

        resultCard.innerHTML = `
          <div class="result-header">
            <img src="${imgSrc}" alt="Album art" />
            <div class="result-meta">
              <h2>${escHtml(data.track)}</h2>
              <div class="artist-name">${escHtml(data.artist)}</div>
              ${data.album ? `<div class="album-name">${escHtml(data.album)}</div>` : ''}
            </div>
          </div>
          <div class="result-body">
            <div class="stat-row">
              <span class="stat-icon">📅</span>
              <div>
                <div class="stat-label">First listened on</div>
                <div class="stat-value">${escHtml(niceDate)}${niceTime ? ' at ' + escHtml(niceTime) : ''}</div>
                ${dateNote ? `<div class="stat-note">${escHtml(dateNote)}</div>` : ''}
              </div>
            </div>
            <div class="stat-row">
              <span class="stat-icon">⏳</span>
              <div>
                <div class="stat-label">That was</div>
                <div class="stat-value">${escHtml(timeAgo)}</div>
              </div>
            </div>
            <div class="stat-row">
              <span class="stat-icon">🔁</span>
              <div>
                <div class="stat-label">Track scrobbles</div>
                <div class="stat-value">${data.total_scrobbles.toLocaleString()}</div>
              </div>
            </div>
          </div>
        `;
        resultCard.classList.add('show');
      } catch (err) {
        stopLoadingAnimation();
        showError('Something went wrong. Please try again.');
      }
    }

    function showError(msg) {
      resultCard.innerHTML = `<div class="not-found">⚠️ ${escHtml(msg)}</div>`;
      resultCard.classList.add('show');
    }

    function relativeTime(date) {
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      const intervals = [
        [31536000, 'year'], [2592000, 'month'], [86400, 'day'],
        [3600, 'hour'], [60, 'minute']
      ];
      for (const [secs, label] of intervals) {
        const count = Math.floor(seconds / secs);
        if (count >= 1) return `${count} ${label}${count > 1 ? 's' : ''} ago`;
      }
      return 'just now';
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function escAttr(s) {
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function defaultThumb() {
      return "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect fill=%22%23333%22 width=%2240%22 height=%2240%22/><text x=%2220%22 y=%2224%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2218%22>♪</text></svg>";
    }

    function defaultAlbumArt() {
      return "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23222%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2258%22 text-anchor=%22middle%22 fill=%22%23555%22 font-size=%2240%22>♪</text></svg>";
    }

    function defaultAvatar() {
      return "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2242%22 height=%2242%22><rect fill=%22%23333%22 width=%2242%22 height=%2242%22 rx=%2221%22/><text x=%2221%22 y=%2226%22 text-anchor=%22middle%22 fill=%22%23777%22 font-size=%2220%22>👤</text></svg>";
    }
  </script>
</body>
</html>
